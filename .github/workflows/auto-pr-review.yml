name: Auto PR Review Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Generate diff + analysis
      - name: Analyze PR changes
        id: analysis
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          echo "Base: $BASE"
          echo "Head: $HEAD"

          # Files changed
          git diff --name-only "$BASE" "$HEAD" > changed_files.txt

          FILE_COUNT=$(wc -l < changed_files.txt)
          SUMMARY=$(git diff --shortstat "$BASE" "$HEAD")
          STATS=$(git diff --stat "$BASE" "$HEAD")

          # TODO / FIXME scan
          TODO_FIXME=""

          while read -r file; do
            if [ -f "$file" ]; then
              matches=$(grep -nE "TODO|FIXME" "$file" || true)
              if [ ! -z "$matches" ]; then
                TODO_FIXME+="\n$file\n$matches\n"
              fi
            fi
          done < changed_files.txt

          # Build comment
          COMMENT=$(cat <<EOF
<!-- AUTO_PR_REVIEW_COMMENT -->

## 🧾 Automated PR Review

### 📊 Summary
- Files changed: $FILE_COUNT
- $SUMMARY

### 📈 Diff Stats
\`\`\`
$STATS
\`\`\`

### 🧩 TODO / FIXME
$([ -z "$TODO_FIXME" ] && echo "None found 🎉" || echo -e "$TODO_FIXME")

EOF
)

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 3. Find existing bot comment
      - name: Find existing comment
        id: find_comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- AUTO_PR_REVIEW_COMMENT -->";

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.data.find(c =>
              c.body && c.body.includes(marker)
            );

            return existing ? existing.id : null;

      # 4. Create or update comment
      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.analysis.outputs.comment }}`;
            const commentId = ${{ steps.find_comment.outputs.result }};

            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
